global:
  scrape_interval: 15s
  scrape_timeout: 5s
  evaluation_interval: 15s

rule_files:
  - voiceasset.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 127.0.0.1:19093

scrape_configs:
  - job_name: voiceasset-api
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - 127.0.0.1:18080
        labels:
          deployment: test-10443

  - job_name: voiceasset-prometheus
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - 127.0.0.1:19090
        labels:
          deployment: test-10443
