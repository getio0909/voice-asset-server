name: voiceasset

x-app-common: &app-common
  build:
    context: ../..
    dockerfile: Dockerfile
  environment:
    DATABASE_URL: postgres://${POSTGRES_USER:-voiceasset}:${POSTGRES_PASSWORD:-voiceasset-development-only}@postgres:5432/${POSTGRES_DB:-voiceasset}?sslmode=disable
    VOICEASSET_BRAND_NAME: ${VOICEASSET_BRAND_NAME:-VoiceAsset}
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - backend
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

services:
  postgres:
    image: postgres:17.10-alpine3.24@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voiceasset}
      POSTGRES_USER: ${POSTGRES_USER:-voiceasset}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voiceasset-development-only}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped

  migrate:
    <<: *app-common
    command: ["/app/migrate"]
    restart: "no"
    healthcheck:
      disable: true

  api:
    <<: *app-common
    command: ["/app/api"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-voiceasset}:${POSTGRES_PASSWORD:-voiceasset-development-only}@postgres:5432/${POSTGRES_DB:-voiceasset}?sslmode=disable
      VOICEASSET_BRAND_NAME: ${VOICEASSET_BRAND_NAME:-VoiceAsset}
      VOICEASSET_HTTP_ADDR: :8080
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${VOICEASSET_PORT:-8080}:8080"

  worker:
    <<: *app-common
    command: ["/app/worker"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      disable: true

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
