name: Release candidate

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.15.0
      - name: Run release tests
        run: go test ./...
      - name: Test OCI release validation
        run: node --test scripts/verify-oci-image.test.mjs scripts/container-release.test.mjs
      - name: Build AMD64 and ARM64 archives
        shell: bash
        run: bash scripts/build-release.sh "$GITHUB_REF_NAME" "$GITHUB_SHA" dist
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          image: docker.io/tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: amd64,arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          driver-opts: image=moby/buildkit@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec
      - name: Build and verify AMD64 and ARM64 OCI image
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
        shell: bash
        run: |
          image_tag=${GITHUB_REF_NAME//+/-}
          archive="dist/voiceasset-server-${GITHUB_REF_NAME}-linux-amd64-arm64.oci.tar"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "VERSION=$GITHUB_REF_NAME" \
            --build-arg "COMMIT=$GITHUB_SHA" \
            --tag "voiceasset-server:$image_tag" \
            --provenance=false \
            --sbom=false \
            --output "type=oci,dest=$archive,oci-mediatypes=true" \
            .
          node scripts/verify-oci-image.mjs \
            "$archive" voiceasset-server "$GITHUB_REF_NAME" "$GITHUB_SHA"
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/voiceasset-server-source.spdx.json
          upload-artifact: false
      - name: Generate checksums
        shell: bash
        run: bash scripts/write-checksums.sh dist
      - name: Verify release artifacts
        shell: bash
        run: >-
          bash scripts/verify-release.sh "$GITHUB_REF_NAME" "$GITHUB_SHA" dist
          --require-sbom --require-container
      - name: Create or update draft prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            test "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)" = true
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --draft --prerelease \
              --generate-notes --title "VoiceAsset Server $GITHUB_REF_NAME"
          fi
