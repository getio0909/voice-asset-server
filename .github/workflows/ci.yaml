name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, test, contract, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17.10-alpine3.24@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: voiceasset_test
          POSTGRES_USER: voiceasset
          POSTGRES_PASSWORD: voiceasset-ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U voiceasset -d voiceasset_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      TEST_DATABASE_URL: postgres://voiceasset:voiceasset-ci-only@127.0.0.1:5432/voiceasset_test?sslmode=disable
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Set up Node for OpenAPI lint
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
      - name: Test workspace compatibility verifier
        run: node --test scripts/verify-workspace-compatibility.test.mjs
      - name: Test OCI release verifier
        run: node --test scripts/verify-oci-image.test.mjs scripts/container-release.test.mjs
      - name: Verify formatting
        shell: bash
        run: |
          files="$(gofmt -l .)"
          test -z "$files" || { printf '%s\n' "$files"; exit 1; }
      - name: Verify modules
        run: go mod verify
      - name: Vet
        run: go vet ./...
      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out ./...
      - name: Lint OpenAPI 3.1 contract
        run: npx --yes @redocly/cli@2.39.0 lint contracts/openapi.yaml
      - name: Validate Prometheus config and rules
        shell: bash
        env:
          PROMETHEUS_VERSION: 3.13.1
          PROMETHEUS_LINUX_AMD64_SHA256: 962b812371aff838d152b6ff2d56fdb7a6396f5542f48ebf73421b9721f0d103
        run: |
          set -euo pipefail
          repo_root="$PWD"
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          archive="prometheus-${PROMETHEUS_VERSION}.linux-amd64.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$tmpdir/$archive" \
            "https://github.com/prometheus/prometheus/releases/download/v${PROMETHEUS_VERSION}/${archive}"
          printf '%s  %s\n' \
            "$PROMETHEUS_LINUX_AMD64_SHA256" \
            "$tmpdir/$archive" | sha256sum --check --strict
          tar -xzf "$tmpdir/$archive" -C "$tmpdir"
          promtool="$tmpdir/prometheus-${PROMETHEUS_VERSION}.linux-amd64/promtool"
          cd "$repo_root/deploy/prometheus"
          "$promtool" check config prometheus.yml
          "$promtool" check rules voiceasset.rules.yml
          "$promtool" test rules voiceasset.rules.test.yml
      - name: Build release commands
        shell: bash
        run: |
          mkdir -p .build
          go build -trimpath -o .build/voiceasset-api ./cmd/api
          go build -trimpath -o .build/voiceasset-worker ./cmd/worker
          go build -trimpath -o .build/voiceasset-migrate ./cmd/migrate
          go build -trimpath -o .build/voiceasset-adminctl ./cmd/adminctl
      - name: Validate Compose model
        env:
          VOICEASSET_CONSOLE_CONTEXT: .
        run: docker compose -f deploy/compose/compose.yaml config --quiet
      - name: Build runtime image
        run: docker build --tag voiceasset-server:ci .
      - name: Run real backup and clean-restore smoke test
        env:
          VOICEASSET_CI_DATABASE_PASSWORD: voiceasset-ci-only
        run: |
          chmod +x scripts/ci-backup-restore.sh
          ./scripts/ci-backup-restore.sh voiceasset-server:ci
      - name: Upload binaries and coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-ci-artifacts
          path: |
            .build/
            coverage.out
          if-no-files-found: error

  security:
    name: Dependency, secret, license, and SBOM checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Vulnerability audit
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: Dependency license policy
        run: >-
          go run github.com/google/go-licenses@v1.6.0 check ./...
          --allowed_licenses=Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MIT
          --ignore=github.com/getio0909/voice-asset-server
      - name: Secret scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: server.spdx.json
          upload-artifact: false
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-sbom
          path: server.spdx.json
          if-no-files-found: error
