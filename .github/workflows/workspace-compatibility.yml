name: Workspace Compatibility

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      component_ref:
        description: Shared Git ref to check out from the four client repositories
        required: true
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: workspace-compatibility-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify five-repository contract and capabilities
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out Server candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: workspace/voice-asset-server
          persist-credentials: false
      - name: Resolve shared client ref
        id: component-ref
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          HEAD_REF: ${{ github.head_ref }}
          INPUT_REF: ${{ inputs.component_ref }}
        run: |
          set -euo pipefail
          ref="${INPUT_REF:-${HEAD_REF:-main}}"
          if [[ "$ref" == "main" ]]; then
            echo "component_ref=main" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          for repo in voice-asset-console voice-asset-android voice-asset-mcp voice-asset-site; do
            if ! git ls-remote --exit-code --heads \
              "https://github.com/${OWNER}/${repo}.git" "refs/heads/${ref}" >/dev/null 2>&1; then
              echo "Shared ref '${ref}' is not present in ${repo}; using main for clients."
              echo "component_ref=main" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "component_ref=${ref}" >> "$GITHUB_OUTPUT"
      - name: Check out Console
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.repository_owner }}/voice-asset-console
          ref: ${{ steps.component-ref.outputs.component_ref }}
          path: workspace/voice-asset-console
          persist-credentials: false
      - name: Check out Android
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.repository_owner }}/voice-asset-android
          ref: ${{ steps.component-ref.outputs.component_ref }}
          path: workspace/voice-asset-android
          persist-credentials: false
      - name: Check out MCP
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.repository_owner }}/voice-asset-mcp
          ref: ${{ steps.component-ref.outputs.component_ref }}
          path: workspace/voice-asset-mcp
          persist-credentials: false
      - name: Check out Site
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.repository_owner }}/voice-asset-site
          ref: ${{ steps.component-ref.outputs.component_ref }}
          path: workspace/voice-asset-site
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: workspace/voice-asset-server/go.mod
          cache-dependency-path: workspace/voice-asset-server/go.sum
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
      - name: Test verifier failure modes
        run: node --test workspace/voice-asset-server/scripts/verify-workspace-compatibility.test.mjs
      - name: Verify live workspace compatibility
        env:
          VOICEASSET_WORKSPACE: ${{ github.workspace }}/workspace
        run: node workspace/voice-asset-server/scripts/verify-workspace-compatibility.mjs
